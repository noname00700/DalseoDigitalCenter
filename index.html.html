<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>달서디지털체험센터 방문자 카운터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg-deep:#070B14;
    --bg-deep-2:#0B1224;
    --bg-panel:#101a2e;
    --bg-panel-2:#16223c;
    --accent-cyan:#22e1ff;
    --accent-cyan-dim:rgba(34,225,255,0.35);
    --accent-amber:#ffb300;
    --text-primary:#eaf1fb;
    --text-muted:#7f90ac;
    --border-soft:rgba(255,255,255,0.08);
    --danger:#ff5c72;
    --good:#33e39a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--text-primary);
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(34,225,255,0.10), transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(255,179,0,0.06), transparent 60%),
      var(--bg-deep);
    background-attachment:fixed;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--border-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 75%);
    pointer-events:none;
    z-index:0;
  }
  .screen{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column;}
  a, button{font-family:inherit;}

  /* ---------- Visitor screen ---------- */
  #visitorScreen{align-items:center; justify-content:center; padding:32px 20px 20px;}
  .brand{
    display:flex; flex-direction:column; align-items:center; gap:10px;
    margin-bottom:28px; text-align:center;
  }
  .brand-mark{
    width:46px; height:46px; border-radius:12px;
    background:linear-gradient(145deg, var(--accent-cyan), #0a7ba8);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 24px var(--accent-cyan-dim);
    font-family:'Orbitron', sans-serif; font-weight:900; color:#04121a; font-size:18px;
  }
  .brand-eyebrow{
    font-size:12px; letter-spacing:0.18em; color:var(--text-muted); font-weight:600;
  }
  .brand-title{font-size:15px; font-weight:700; color:var(--text-primary); letter-spacing:0.02em;}

  .welcome-line{
    text-align:center; color:var(--text-muted); font-size:14px; line-height:1.6;
    max-width:280px; margin-top:8px;
  }

  .status-dot{
    display:inline-flex; align-items:center; gap:8px; color:var(--text-muted); font-size:13px;
    margin-top:22px;
  }
  .status-dot .dot{
    width:7px; height:7px; border-radius:50%; background:var(--accent-cyan);
    box-shadow:0 0 8px var(--accent-cyan);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.4;transform:scale(0.85);}50%{opacity:1;transform:scale(1.1);}}

  .admin-link{
    position:fixed; bottom:18px; left:0; right:0; text-align:center; z-index:2;
  }
  .admin-link button{
    background:none; border:none; color:var(--text-muted); font-size:11px;
    letter-spacing:0.08em; cursor:pointer; padding:8px 14px; opacity:0.55;
    transition:opacity .2s;
  }
  .admin-link button:hover{opacity:1;}

  /* Modal */
  .modal-backdrop{
    position:fixed; inset:0; z-index:10;
    background:rgba(4,8,16,0.72);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:22px;
    opacity:0; pointer-events:none;
    transition:opacity .35s ease;
  }
  .modal-backdrop.show{opacity:1; pointer-events:all;}
  .ticket{
    width:100%; max-width:340px;
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--border-soft);
    border-radius:20px;
    padding:30px 26px 26px;
    box-shadow:0 0 0 1px rgba(34,225,255,0.06), 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 40px -8px var(--accent-cyan-dim);
    text-align:center;
    transform:translateY(18px) scale(0.96);
    opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.25,1.1), opacity .4s ease;
  }
  .modal-backdrop.show .ticket{transform:translateY(0) scale(1); opacity:1;}
  .ticket-eyebrow{
    font-size:11px; letter-spacing:0.2em; color:var(--accent-cyan); font-weight:700;
    margin-bottom:6px;
  }
  .ticket-center{
    font-size:19px; font-weight:800; color:var(--text-primary); letter-spacing:-0.01em;
    margin-bottom:2px;
  }
  .ticket-date{
    font-size:13px; color:var(--text-muted); margin-bottom:20px; font-weight:500;
  }
  .digit-row{
    display:flex; gap:6px; justify-content:center; margin-bottom:16px;
  }
  .digit-tile{
    width:38px; height:52px; border-radius:8px;
    background:#050a13;
    border:1px solid rgba(255,179,0,0.25);
    box-shadow:inset 0 0 12px rgba(255,179,0,0.08), 0 0 14px rgba(255,179,0,0.10);
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron', sans-serif; font-weight:700; font-size:24px;
    color:var(--accent-amber);
    text-shadow:0 0 12px rgba(255,179,0,0.65);
  }
  .ticket-caption{
    font-size:15px; font-weight:700; color:var(--text-primary); margin-bottom:22px;
  }
  .ticket-caption b{color:var(--accent-amber); font-weight:800;}
  .ticket-btn{
    width:100%; padding:13px; border-radius:12px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--accent-cyan), #0a8fb5);
    color:#04121a; font-weight:800; font-size:14px; letter-spacing:0.02em;
    transition:filter .2s, transform .15s;
  }
  .ticket-btn:hover{filter:brightness(1.08);}
  .ticket-btn:active{transform:scale(0.98);}

  .loading-text{color:var(--text-muted); font-size:13px; display:flex; align-items:center; gap:8px;}
  .spinner{
    width:14px; height:14px; border-radius:50%;
    border:2px solid rgba(34,225,255,0.25); border-top-color:var(--accent-cyan);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Admin screen ---------- */
  #adminScreen{display:none; padding:26px 18px 60px;}
  .admin-wrap{max-width:760px; margin:0 auto; width:100%;}
  .admin-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-bottom:22px; flex-wrap:wrap;
  }
  .admin-header h1{
    font-size:18px; font-weight:800; margin:0; letter-spacing:-0.01em;
  }
  .admin-header .sub{font-size:12px; color:var(--text-muted); margin-top:3px;}
  .icon-btn{
    background:var(--bg-panel); border:1px solid var(--border-soft); color:var(--text-muted);
    padding:9px 14px; border-radius:10px; font-size:12px; cursor:pointer; font-weight:600;
    transition:all .15s;
  }
  .icon-btn:hover{color:var(--text-primary); border-color:var(--accent-cyan-dim);}
  .icon-btn.danger:hover{color:var(--danger); border-color:rgba(255,92,114,0.4);}

  .login-card{
    max-width:320px; margin:14vh auto 0; background:var(--bg-panel);
    border:1px solid var(--border-soft); border-radius:16px; padding:28px 24px; text-align:center;
  }
  .login-card h2{font-size:16px; margin:0 0 6px;}
  .login-card p{font-size:12.5px; color:var(--text-muted); margin:0 0 18px;}
  .login-card input{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border-soft);
    background:var(--bg-deep-2); color:var(--text-primary); font-size:14px; margin-bottom:10px;
    outline:none;
  }
  .login-card input:focus{border-color:var(--accent-cyan-dim);}
  .login-error{color:var(--danger); font-size:12px; min-height:16px; margin-bottom:6px;}

  .stat-cards{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;}
  .stat-card{
    background:var(--bg-panel); border:1px solid var(--border-soft); border-radius:14px;
    padding:16px 18px;
  }
  .stat-card .label{font-size:11.5px; color:var(--text-muted); font-weight:600; letter-spacing:0.03em;}
  .stat-card .value{
    font-family:'Orbitron', sans-serif; font-size:28px; font-weight:700; margin-top:6px;
    color:var(--accent-amber); text-shadow:0 0 14px rgba(255,179,0,0.35);
  }
  .stat-card.cyan .value{color:var(--accent-cyan); text-shadow:0 0 14px rgba(34,225,255,0.35);}

  .panel{
    background:var(--bg-panel); border:1px solid var(--border-soft); border-radius:14px;
    padding:18px 18px 12px; margin-bottom:16px;
  }
  .panel h3{font-size:13px; margin:0 0 14px; color:var(--text-muted); font-weight:700; letter-spacing:0.03em; text-transform:uppercase;}

  .bar-row{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
  .bar-row .b-date{width:78px; flex-shrink:0; font-size:11.5px; color:var(--text-muted); font-variant-numeric:tabular-nums;}
  .bar-row .b-track{flex:1; height:16px; background:var(--bg-deep-2); border-radius:6px; overflow:hidden;}
  .bar-row .b-fill{height:100%; border-radius:6px; background:linear-gradient(90deg, #0a8fb5, var(--accent-cyan)); transition:width .5s ease;}
  .bar-row .b-val{width:44px; text-align:right; flex-shrink:0; font-size:12px; font-weight:700; color:var(--text-primary); font-variant-numeric:tabular-nums;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:9px 8px; border-bottom:1px solid var(--border-soft);}
  th{color:var(--text-muted); font-weight:600; font-size:11.5px; letter-spacing:0.03em; text-transform:uppercase;}
  td.num{text-align:right; font-variant-numeric:tabular-nums; font-weight:700; color:var(--accent-amber);}
  .empty-note{color:var(--text-muted); font-size:12.5px; padding:14px 0; text-align:center;}

  .foot-note{font-size:11px; color:var(--text-muted); text-align:center; margin-top:10px; opacity:0.6;}

  @media (max-width:420px){
    .digit-tile{width:32px; height:46px; font-size:20px;}
    .stat-card .value{font-size:24px;}
  }
</style>
</head>
<body>

  <!-- ===================== VISITOR SCREEN ===================== -->
  <div id="visitorScreen" class="screen">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div class="brand-eyebrow">DALSEO DIGITAL EXPERIENCE CENTER</div>
      <div class="brand-title">달서디지털체험센터</div>
    </div>
    <div id="visitorStatus" class="loading-text"><span class="spinner"></span> 방문을 기록하는 중입니다...</div>
    <div id="welcomeLine" class="welcome-line" style="display:none;">환영합니다. 오늘도 즐거운 체험 되세요!</div>

    <div class="admin-link"><button id="openAdminBtn">관리자</button></div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="ticket">
      <div class="ticket-eyebrow">VISIT CONFIRMED</div>
      <div class="ticket-center">달서디지털체험센터</div>
      <div id="ticketDate" class="ticket-date">-</div>
      <div id="digitRow" class="digit-row"></div>
      <div class="ticket-caption">번째 방문객입니다.</div>
      <button class="ticket-btn" id="closeTicketBtn">확인</button>
    </div>
  </div>

  <!-- ===================== ADMIN SCREEN ===================== -->
  <div id="adminScreen" class="screen">
    <div class="admin-wrap">

      <div id="loginView" class="login-card">
        <h2>관리자 로그인</h2>
        <p>비밀번호를 입력해 방문자 통계를 확인하세요.</p>
        <input type="password" id="adminPw" placeholder="비밀번호" />
        <div id="loginError" class="login-error"></div>
        <button class="ticket-btn" id="loginBtn">로그인</button>
        <div style="margin-top:14px;"><button class="icon-btn" id="backToVisitorBtn">← 방문자 화면으로</button></div>
      </div>

      <div id="dashboardView" style="display:none;">
        <div class="admin-header">
          <div>
            <h1>달서디지털체험센터 · 방문자 통계</h1>
            <div class="sub" id="lastUpdated">-</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="icon-btn" id="refreshBtn">새로고침</button>
            <button class="icon-btn danger" id="resetBtn">전체 초기화</button>
            <button class="icon-btn" id="backToVisitorBtn2">방문자 화면</button>
          </div>
        </div>

        <div class="stat-cards">
          <div class="stat-card">
            <div class="label">누적 방문자 수</div>
            <div class="value" id="totalVal">0</div>
          </div>
          <div class="stat-card cyan">
            <div class="label">오늘 방문자 수</div>
            <div class="value" id="todayVal">0</div>
          </div>
        </div>

        <div class="panel">
          <h3>최근 14일 추이</h3>
          <div id="barChart"></div>
        </div>

        <div class="panel">
          <h3>날짜별 상세</h3>
          <table>
            <thead><tr><th>날짜</th><th>요일</th><th style="text-align:right;">방문자 수</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="emptyNote" class="empty-note" style="display:none;">아직 기록된 방문이 없습니다.</div>
        </div>

        <div class="foot-note">데이터는 이 앱을 사용하는 모든 사람과 공유되는 저장소에 기록됩니다.</div>
      </div>
    </div>
  </div>

<script>
(function(){
  const STORAGE_KEY = 'dalseo-visit-stats';
  const ADMIN_PASSWORD = 'dalseo2026'; // 관리자 페이지 접속용 비밀번호 (필요 시 이 값을 바꿔서 사용하세요)
  const WEEKDAYS = ['일','월','화','수','목','금','토'];

  function pad2(n){ return String(n).padStart(2,'0'); }
  function todayKey(d){
    d = d || new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }
  function formatDateLabel(d){
    d = d || new Date();
    return `${d.getFullYear()}. ${pad2(d.getMonth()+1)}. ${pad2(d.getDate())}. ${WEEKDAYS[d.getDay()]}`;
  }

  async function loadStats(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        if(!parsed.daily) parsed.daily = {};
        if(typeof parsed.total !== 'number') parsed.total = 0;
        return parsed;
      }
      return { total: 0, daily: {} };
    }catch(e){
      return { total: 0, daily: {} };
    }
  }

  async function saveStats(stats){
    stats.updatedAt = new Date().toISOString();
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(stats), true);
    }catch(e){
      console.error('저장 실패', e);
    }
    return stats;
  }

  /* ---------------- Visitor flow ---------------- */
  async function runVisitorFlow(){
    const stats = await loadStats();
    const key = todayKey();
    stats.total = (stats.total || 0) + 1;
    stats.daily[key] = (stats.daily[key] || 0) + 1;
    await saveStats(stats);

    document.getElementById('visitorStatus').style.display = 'none';
    document.getElementById('welcomeLine').style.display = 'block';
    document.getElementById('ticketDate').textContent = formatDateLabel();

    showTicket(stats.daily[key]);
  }

  function renderDigits(n){
    const row = document.getElementById('digitRow');
    const str = String(n).padStart(5, '0');
    row.innerHTML = str.split('').map(ch => `<div class="digit-tile">${ch}</div>`).join('');
  }

  function showTicket(targetNumber){
    const backdrop = document.getElementById('modalBackdrop');
    backdrop.classList.add('show');

    // count-up animation
    const start = Math.max(0, targetNumber - 40);
    const duration = 700;
    const startTime = performance.now();
    function frame(now){
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.round(start + (targetNumber - start) * eased);
      renderDigits(val);
      if(t < 1) requestAnimationFrame(frame);
      else renderDigits(targetNumber);
    }
    requestAnimationFrame(frame);
  }

  document.getElementById('closeTicketBtn').addEventListener('click', () => {
    document.getElementById('modalBackdrop').classList.remove('show');
  });

  /* ---------------- Admin flow ---------------- */
  function switchToAdmin(){
    document.getElementById('visitorScreen').style.display = 'none';
    document.getElementById('modalBackdrop').classList.remove('show');
    document.getElementById('adminScreen').style.display = 'flex';
  }
  function switchToVisitor(){
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('visitorScreen').style.display = 'flex';
  }

  document.getElementById('openAdminBtn').addEventListener('click', () => {
    switchToAdmin();
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('dashboardView').style.display = 'none';
  });
  document.getElementById('backToVisitorBtn').addEventListener('click', switchToVisitor);
  document.getElementById('backToVisitorBtn2').addEventListener('click', switchToVisitor);

  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('adminPw').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') tryLogin();
  });

  function tryLogin(){
    const val = document.getElementById('adminPw').value;
    if(val === ADMIN_PASSWORD){
      document.getElementById('loginError').textContent = '';
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('dashboardView').style.display = 'block';
      loadDashboard();
    }else{
      document.getElementById('loginError').textContent = '비밀번호가 올바르지 않습니다.';
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
  document.getElementById('resetBtn').addEventListener('click', async () => {
    if(confirm('모든 방문 기록을 초기화할까요? 이 작업은 되돌릴 수 없습니다.')){
      await saveStats({ total: 0, daily: {} });
      loadDashboard();
    }
  });

  async function loadDashboard(){
    const stats = await loadStats();
    const key = todayKey();

    document.getElementById('totalVal').textContent = (stats.total || 0).toLocaleString();
    document.getElementById('todayVal').textContent = (stats.daily[key] || 0).toLocaleString();
    document.getElementById('lastUpdated').textContent = stats.updatedAt
      ? '마지막 갱신: ' + new Date(stats.updatedAt).toLocaleString('ko-KR')
      : '아직 기록된 데이터가 없습니다';

    const entries = Object.entries(stats.daily || {}).sort((a,b) => b[0].localeCompare(a[0]));

    // table
    const tbody = document.getElementById('tableBody');
    const emptyNote = document.getElementById('emptyNote');
    if(entries.length === 0){
      tbody.innerHTML = '';
      emptyNote.style.display = 'block';
    }else{
      emptyNote.style.display = 'none';
      tbody.innerHTML = entries.map(([date, count]) => {
        const d = new Date(date + 'T00:00:00');
        const wd = WEEKDAYS[d.getDay()];
        return `<tr><td>${date}</td><td>${wd}</td><td class="num">${count.toLocaleString()}</td></tr>`;
      }).join('');
    }

    // bar chart: last 14 days including days with 0
    const days = [];
    for(let i = 13; i >= 0; i--){
      const d = new Date();
      d.setDate(d.getDate() - i);
      const k = todayKey(d);
      days.push({ key: k, label: `${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`, count: stats.daily[k] || 0 });
    }
    const max = Math.max(1, ...days.map(d => d.count));
    document.getElementById('barChart').innerHTML = days.map(d => `
      <div class="bar-row">
        <div class="b-date">${d.label}</div>
        <div class="b-track"><div class="b-fill" style="width:${(d.count / max * 100)}%"></div></div>
        <div class="b-val">${d.count}</div>
      </div>
    `).join('');
  }

  /* ---------------- Init ---------------- */
  const params = new URLSearchParams(location.search);
  if(params.get('admin') !== null){
    switchToAdmin();
  }else{
    runVisitorFlow();
  }
})();
</script>
</body>
</html>
